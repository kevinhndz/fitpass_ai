<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Validar Acceso — Sport Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:     #00e5a0;
      --verde-rgb: 0, 229, 160;
      --rojo:      #ff4d6d;
      --rojo-rgb:  255, 77, 109;
      --amarillo:  #f5a623;
      --am-rgb:    245, 166, 35;
      --fondo:     #080810;
      --tarjeta:   rgba(16, 16, 26, 0.82);
      --borde:     rgba(255, 255, 255, 0.09);
      --borde-top: rgba(255, 255, 255, 0.18);
      --texto:     #f0f0f8;
      --subtexto:  #8888a0;
    }

    body {
      background: var(--fondo);
      color: var(--texto);
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* — Fondo ambient — */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(var(--verde-rgb), 0.12), transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(var(--rojo-rgb), 0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 128px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 1;
    }

    /* Contenido sobre fondo */
    .logo, .gym-nombre, #contenido, .pie { position: relative; z-index: 2; }

    /* — Logo — */
    .logo {
      font-size: 48px;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 24px rgba(var(--verde-rgb), 0.5));
    }

    .gym-nombre {
      font-size: 11px;
      color: var(--subtexto);
      margin-bottom: 36px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* — Tarjeta de resultado — */
    .tarjeta {
      width: 100%;
      max-width: 380px;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      border: 1px solid var(--borde);
      border-top: 1px solid var(--borde-top);
      background: var(--tarjeta);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 2px 0 rgba(255,255,255,0.07) inset,
        0 32px 64px -16px rgba(0, 0, 0, 0.7);
      animation: aparecer 0.5s cubic-bezier(.22,1,.36,1) both;
      position: relative;
      overflow: hidden;
    }

    /* Brillo superior cristal */
    .tarjeta::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* — Variantes de color — */
    .verde    { border-color: rgba(var(--verde-rgb), 0.35); box-shadow: 0 2px 0 rgba(255,255,255,0.07) inset, 0 32px 64px -16px rgba(0,0,0,0.7), 0 0 60px rgba(var(--verde-rgb), 0.15); }
    .rojo     { border-color: rgba(var(--rojo-rgb), 0.35);  box-shadow: 0 2px 0 rgba(255,255,255,0.07) inset, 0 32px 64px -16px rgba(0,0,0,0.7), 0 0 60px rgba(var(--rojo-rgb), 0.15); }
    .amarillo { border-color: rgba(var(--am-rgb), 0.35);    box-shadow: 0 2px 0 rgba(255,255,255,0.07) inset, 0 32px 64px -16px rgba(0,0,0,0.7), 0 0 60px rgba(var(--am-rgb), 0.15); }

    /* — Icono de estado — */
    .icono-estado {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
      animation: iconoEntrar 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both;
    }

    @keyframes iconoEntrar {
      from { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);     opacity: 1; }
    }

    .estado-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .verde    .estado-titulo { color: var(--verde);    text-shadow: 0 0 24px rgba(var(--verde-rgb), 0.6); }
    .rojo     .estado-titulo { color: var(--rojo);     text-shadow: 0 0 24px rgba(var(--rojo-rgb), 0.6); }
    .amarillo .estado-titulo { color: var(--amarillo); text-shadow: 0 0 24px rgba(var(--am-rgb), 0.6); }

    .estado-subtitulo {
      font-size: 14px;
      color: var(--subtexto);
      margin-bottom: 28px;
      line-height: 1.65;
    }

    .divider {
      height: 1px;
      background: var(--borde);
      margin: 20px 0;
    }

    /* — Datos del cliente — */
    .dato {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--borde);
    }
    .dato:last-child { border-bottom: 0; }

    .dato-label { color: var(--subtexto); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .dato-valor { font-weight: 700; font-size: 14px; }

    /* — Spinner de carga — */
    .cargando {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      color: var(--subtexto);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(var(--verde-rgb), 0.15);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: girar 0.75s linear infinite;
      box-shadow: 0 0 24px rgba(var(--verde-rgb), 0.25);
    }

    @keyframes girar { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--rojo);
      font-size: 15px;
      text-align: center;
      padding: 20px;
      background: rgba(var(--rojo-rgb), 0.08);
      border: 1px solid rgba(var(--rojo-rgb), 0.25);
      border-radius: 14px;
      max-width: 380px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .pie {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="logo">🏋️‍♂️</div>
  <p class="gym-nombre">Sport Fitness — Control de Acceso</p>

  <div id="contenido">
    <div class="cargando">
      <div class="spinner"></div>
      <span>Verificando membresía...</span>
    </div>
  </div>

  <p class="pie">© 2026 Sport Fitness — Uso interno de recepción</p>

<script>
  const partes    = window.location.pathname.split('/');
  const clienteId = partes[partes.length - 1];

  if (!clienteId || isNaN(clienteId)) {
    mostrarError('URL inválida. Escanea el QR nuevamente.');
  } else {
    fetch(`/api/validar/${clienteId}`)
      .then(r => r.json())
      .then(renderizar)
      .catch(() => mostrarError('No se pudo conectar con el servidor.'));
  }

  function renderizar(d) {
    const hoy    = new Date();
    hoy.setHours(0, 0, 0, 0);
    const vence  = new Date(d.fecha_vencimiento + 'T00:00:00');
    const diffMs = vence - hoy;
    const dias   = Math.round(diffMs / (1000 * 60 * 60 * 24));

    let clase, icono, titulo, subtitulo;

    if (dias > 1) {
      clase     = 'verde';
      icono     = '✅';
      titulo    = 'PUEDE PASAR';
      subtitulo = `Su membresía vence en <strong>${dias} día(s)</strong>.<br>Recuérdale que debe pagar antes de esa fecha.`;
    } else if (dias === 1) {
      clase     = 'amarillo';
      icono     = '⚠️';
      titulo    = 'VENCE MAÑANA';
      subtitulo = `Hoy es el último día con cobertura.<br>Invítale a pagar hoy mismo.`;
    } else if (dias === 0) {
      clase     = 'rojo';
      icono     = '🔴';
      titulo    = 'LE TOCA PAGAR HOY';
      subtitulo = `Su membresía <strong>vence hoy</strong>.<br>Debe pagar antes de salir.`;
    } else {
      const retraso = Math.abs(dias);
      clase     = 'rojo';
      icono     = '❌';
      titulo    = 'MEMBRESÍA VENCIDA';
      subtitulo = `Tiene <strong>${retraso} día(s) de retraso</strong>.<br>No puede acceder hasta regularizar su pago.`;
    }

    function formatearMembresia(val) {
      const p = val.split('_');
      return 'Mensualidad ' + p[1].charAt(0).toUpperCase() + p[1].slice(1);
    }

    function formatearFecha(str) {
      const [y, m, dia] = str.split('-');
      return `${dia}/${m}/${y}`;
    }

    document.getElementById('contenido').innerHTML = `
      <div class="tarjeta ${clase}">
        <span class="icono-estado">${icono}</span>
        <div class="estado-titulo">${titulo}</div>
        <div class="estado-subtitulo">${subtitulo}</div>
        <div class="divider"></div>
        <div class="dato">
          <span class="dato-label">Cliente</span>
          <span class="dato-valor">${d.nombre}</span>
        </div>
        <div class="dato">
          <span class="dato-label">Membresía</span>
          <span class="dato-valor">${formatearMembresia(d.membresia)}</span>
        </div>
        <div class="dato">
          <span class="dato-label">Inicio</span>
          <span class="dato-valor">${formatearFecha(d.fecha_inicio)}</span>
        </div>
        <div class="dato">
          <span class="dato-label">Vencimiento</span>
          <span class="dato-valor">${formatearFecha(d.fecha_vencimiento)}</span>
        </div>
      </div>`;
  }

  function mostrarError(msg) {
    document.getElementById('contenido').innerHTML =
      `<p class="error-msg">⚠️ ${msg}</p>`;
  }
</script>
</body>
</html>
